<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Đăng nhập BenBooks - Kích hoạt gói đọc sách cá nhân">
  <title>Đăng Nhập - BenBooks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="assets/img/benito-logo-short.svg">
</head>
<body data-page="login">

  <!-- ============ HEADER ============ -->
  <header class="site-header">
    <div class="container-1440 header-inner">
      <a href="index.html" class="header-logo">
        <img src="assets/img/benbooks-logo.svg" alt="BenBooks Logo">
      </a>
      <div class="header-search">
        <input type="text" placeholder="Nhập từ khóa tìm kiếm..." autocomplete="off" disabled>
        <button class="btn-search" aria-label="Tìm kiếm"><i class="bi bi-search"></i></button>
      </div>
      <div class="header-actions">
        <div class="header-hotline">
          <i class="bi bi-telephone-fill"></i>
          <span>Hotline: <strong>0382832993</strong></span>
        </div>
        <a href="index.html" class="btn-goicuoc">
          <i class="bi bi-house"></i> Trang Chủ
        </a>
      </div>
    </div>
  </header>

  <!-- ============ LOGIN FORM ============ -->
  <div class="login-page-wrapper">
    <div class="login-card animate-in">
      <img src="assets/img/benbooks-logo.svg" alt="BenBooks" class="login-logo">
      <h2>Đăng Nhập</h2>
      <p class="login-desc">Nhập số điện thoại và mã SMS để truy cập gói đọc sách</p>

      <div class="mb-3 text-start">
        <label for="login-phone" class="form-label">Số điện thoại</label>
        <input type="tel" class="form-control" id="login-phone" placeholder="+84944640034" value="+84944640034">
      </div>
      <div class="mb-3 text-start">
        <label for="login-code" class="form-label">Mã xác nhận SMS</label>
        <div class="d-flex gap-2">
          <input type="text" class="form-control" id="login-code" placeholder="Nhập mã 6 số" maxlength="6">
          <button class="btn-get-sms" type="button" id="btn-send-sms">Gửi mã</button>
        </div>
      </div>

      <button class="btn-login" id="btn-login">
        <i class="bi bi-box-arrow-in-right"></i> ĐĂNG NHẬP
      </button>

      <p style="margin-top:18px;font-size: 16px;color:var(--icon);">
        <a href="index.html"><i class="bi bi-arrow-left"></i> Quay lại trang chủ</a>
      </p>
    </div>
  </div>

  <!-- ============ SUCCESS MODAL ============ -->
  <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-success">
        <div class="modal-header">
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
        <div class="modal-body">
          <span class="modal-icon">✅</span>
          <h4>Chào mừng đến với gói đọc Benbooks</h4>
          <p>Gói đọc Benbooks dành cho hội viên đã được kích hoạt thành công!</p>
          <div class="time-remaining">
            <i class="bi bi-clock"></i> Thời Gian Còn Lại: <strong>31 Ngày</strong>
          </div>
          <div style="margin-top:20px;">
            <a href="index.html" class="btn-activate">
              <i class="bi bi-book"></i> VÀO ĐỌC SÁCH
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ SCRIPTS ============ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
